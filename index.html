<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Sensi VIP - Autenticação</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b0e14;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 90%;
            max-width: 500px;
            background: #151a24;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            text-align: center;
            border: 1px solid #222c3c;
            position: relative;
        }
        
        /* Menu de 3 Botões Superiores */
        .menu-topo-vip {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 25px;
            background: #10141d;
            padding: 8px;
            border-radius: 10px;
            border: 1px solid #ffaa00;
        }
        .btn-topo {
            flex: 1;
            padding: 10px 4px;
            background: #1f2937;
            color: #ffffff;
            border: 1px solid #374151;
            border-radius: 6px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-topo:hover, .btn-topo.ativo {
            background: #ffaa00;
            color: #0b0e14;
            border-color: #ffaa00;
        }

        h1 {
            color: #ffaa00;
            margin-bottom: 10px;
            font-size: 24px;
        }
        p {
            color: #8a99ad;
            font-size: 14px;
            margin-bottom: 25px;
        }
        .input-key {
            width: 100%;
            padding: 12px;
            background: #0b0e14;
            border: 1px solid #374151;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            text-align: center;
            margin-bottom: 15px;
            box-sizing: border-box;
        }
        .input-key:focus {
            border-color: #ffaa00;
            outline: none;
        }
        .btn-entrar {
            width: 100%;
            padding: 12px;
            background: #ffaa00;
            color: #0b0e14;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-entrar:hover {
            background: #e09500;
        }
        
        #conteudo-vip, #area-filtro, #area-modelos {
            display: none;
        }
        
        .btn-marca, .btn-modelo, .btn-filtro {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #1f2937;
            color: white;
            border: 1px solid #374151;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
            box-sizing: border-box;
        }
        .btn-marca:hover, .btn-modelo:hover, .btn-filtro:hover {
            background: #ffaa00;
            color: #0b0e14;
            border-color: #ffaa00;
        }
        .btn-filtro-alto {
            border-color: #ffaa00;
            color: #ffaa00;
        }
        .btn-filtro-alto:hover {
            background: #ffaa00;
            color: #0b0e14;
        }
        .btn-voltar {
            background: #ef4444;
            color: white;
            border: none;
            margin-top: 15px;
        }
        .btn-voltar:hover {
            background: #dc2626;
            color: white;
        }
        .result-box {
            display: none;
            margin-top: 25px;
            padding: 20px;
            background: #0b0e14;
            border-radius: 10px;
            border-left: 5px solid #ffaa00;
            text-align: left;
        }
        .result-box h3 {
            margin-top: 0;
            color: #ffaa00;
        }
        .sensi-value {
            background: #222c3c;
            padding: 8px;
            border-radius: 5px;
            font-family: monospace;
            display: block;
            margin: 5px 0;
        }

        /* LAYOUT CLONADOR ESTILO VÍDEO DO TIKTOK */
        .loading-container {
            display: none;
            margin-top: 20px;
            text-align: center;
        }
        /* Bolinha com a foto de perfil do criador */
        .avatar-tiktok {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 4px solid #ffaa00;
            margin: 0 auto 15px auto;
            background-image: url('https://i.imgur.com/8Q5FvX8.png'); /* Avatar Estilizado TikTok */
            background-size: cover;
            background-position: center;
            box-shadow: 0 0 20px rgba(255, 170, 0, 0.5);
        }
        .barra-progresso-bg {
            background: #1f2937;
            border-radius: 10px;
            overflow: hidden;
            width: 100%;
            height: 16px;
            border: 1px solid #374151;
            margin-top: 15px;
        }
        .barra-progresso-fill {
            width: 0%;
            height: 100%;
            background: #ffaa00;
            transition: width 0.05s linear;
        }
        .texto-porcentagem {
            font-size: 18px;
            font-weight: bold;
            color: #ffaa00;
            margin-top: 5px;
        }
        
        /* Cards das Armas baseadas nos vídeos clássicos de Sensi */
        .card-arma {
            background: #0b0e14;
            border: 1px solid #222c3c;
            border-radius: 10px;
            padding: 15px;
            margin: 15px 0;
            text-align: left;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .card-arma h4 {
            margin: 0 0 10px 0;
            color: #ffaa00;
            font-size: 16px;
            letter-spacing: 1px;
            border-bottom: 1px solid #222c3c;
            padding-bottom: 5px;
        }
    </style>
</head>

        <button class="btn-entrar" onclick="executarClonagemTikTok()">CLONAR SENSI DO VÍDEO</button>
