<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Sensi VIP - Autenticação</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b0e14;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            width: 90%;
            max-width: 500px;
            background: #151a24;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            text-align: center;
            border: 1px solid #222c3c;
            position: relative;
        }
        
        /* Menu Superior */
        .menu-topo-vip {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 25px;
            background: #0b0e14;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #ffaa00;
        }
        .btn-topo {
            flex: 1;
            padding: 8px 4px;
            background: #1f2937;
            color: #ffffff;
            border: 1px solid #374151;
            border-radius: 6px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
        }
        .btn-topo:hover, .btn-topo.ativo {
            background: #ffaa00;
            color: #0b0e14;
            border-color: #ffaa00;
        }

        h1 {
            color: #ffaa00;
            margin-bottom: 10px;
            font-size: 24px;
        }
        p {
            color: #8a99ad;
            font-size: 14px;
            margin-bottom: 25px;
        }
        .input-key {
            width: 100%;
            padding: 12px;
            background: #0b0e14;
            border: 1px solid #374151;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            text-align: center;
            margin-bottom: 15px;
            box-sizing: border-box;
        }
        .input-key:focus {
            border-color: #ffaa00;
            outline: none;
        }
        .btn-entrar {
            width: 100%;
            padding: 12px;
            background: #ffaa00;
            color: #0b0e14;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-entrar:hover {
            background: #e09500;
        }
        
        #conteudo-vip, #area-filtro, #area-modelos, #aba-clonador {
            display: none;
        }
        
        .btn-marca, .btn-modelo, .btn-filtro {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #1f2937;
            color: white;
            border: 1px solid #374151;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
            box-sizing: border-box;
        }
        .btn-marca:hover, .btn-modelo:hover, .btn-filtro:hover {
            background: #ffaa00;
            color: #0b0e14;
            border-color: #ffaa00;
        }
        .btn-filtro-alto {
            border-color: #ffaa00;
            color: #ffaa00;
        }
        .btn-filtro-alto:hover {
            background: #ffaa00;
            color: #0b0e14;
        }
        .btn-voltar {
            background: #ef4444;
            color: white;
            border: none;
            margin-top: 15px;
        }
        .btn-voltar:hover {
            background: #dc2626;
            color: white;
        }
        
        /* Estilos da Bolinha de Carregamento */
        .loading-box {
            display: none;
            margin: 25px auto;
            position: relative;
            width: 100px;
            height: 100px;
        }
        .spinner {
            box-sizing: border-box;
            width: 100%;
            height: 100%;
            border: 8px solid #1f2937;
            border-top: 8px solid #ffaa00;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        .percentual {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 18px;
            font-weight: bold;
            color: #ffaa00;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Container das armas e logs abaixo do carregamento */
        .armas-status {
            display: none;
            margin-top: 15px;
            background: #0b0e14;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #222c3c;
        }
        .arma-item {
            color: #ffaa00;
            font-weight: bold;
            margin: 5px 0;
            font-size: 15px;
            animation: pulse 1.5s infinite ease-in-out;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        .result-box {
            display: none;
            margin-top: 25px;
            padding: 20px;
            background: #0b0e14;
            border-radius: 10px;
            border-left: 5px solid #ffaa00;
            text-align: left;
        }
        .result-box h3 {
            margin-top: 0;
            color: #ffaa00;
        }

            background: #22
